<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MinerU True Copy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f8fafc;
    --fg: #0f172a;
    --muted: #64748b;
    --border: #e2e8f0;
    --blue: #2563eb;
    --blue-light: #dbeafe;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --red-bg: #fef2f2;
    --red-text: #b91c1c;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #020617;
      --fg: #e2e8f0;
      --muted: #94a3b8;
      --border: #1e293b;
      --blue-light: #172554;
      --red-bg: #1c0a0a;
      --red-text: #fca5a5;
    }
  }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    -webkit-user-select: none;
    user-select: none;
    overflow: hidden;
  }

  .logo {
    width: 64px;
    height: 64px;
    background: var(--blue);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 700;
    color: white;
    letter-spacing: -0.5px;
    margin-bottom: 24px;
    box-shadow: 0 4px 16px rgba(37, 99, 235, 0.25);
  }

  .app-name {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 32px;
    letter-spacing: -0.3px;
  }

  /* Progress track */
  .progress-container {
    width: 240px;
    margin-bottom: 16px;
  }

  .progress-track {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: var(--blue);
    border-radius: 2px;
    width: 0%;
    transition: width 0.6s ease;
  }

  /* Indeterminate animation when we don't have progress */
  .progress-bar.indeterminate {
    width: 40%;
    animation: indeterminate 1.5s ease-in-out infinite;
  }

  @keyframes indeterminate {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }

  .status-text {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    min-height: 20px;
    transition: opacity 0.3s ease;
  }

  /* Error state */
  .error-container {
    display: none;
    max-width: 320px;
    margin-top: 8px;
    padding: 12px 16px;
    background: var(--red-bg);
    border: 1px solid var(--red);
    border-radius: 8px;
    text-align: center;
  }

  .error-container.visible {
    display: block;
  }

  .error-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--red-text);
    margin-bottom: 4px;
  }

  .error-detail {
    font-size: 12px;
    color: var(--red-text);
    opacity: 0.8;
    line-height: 1.4;
  }

  .retry-btn {
    margin-top: 10px;
    padding: 6px 16px;
    font-size: 12px;
    font-weight: 500;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .retry-btn:hover {
    opacity: 0.9;
  }

  /* Steps indicator */
  .steps {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }

  .step-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.4s ease, transform 0.3s ease;
  }

  .step-dot.active {
    background: var(--blue);
    transform: scale(1.2);
  }

  .step-dot.done {
    background: var(--green);
  }

  .step-dot.error {
    background: var(--red);
  }
</style>
</head>
<body>
  <div class="logo">DT</div>
  <div class="app-name">MinerU True Copy</div>

  <div class="steps">
    <div class="step-dot" id="step-0"></div>
    <div class="step-dot" id="step-1"></div>
    <div class="step-dot" id="step-2"></div>
  </div>

  <div class="progress-container">
    <div class="progress-track">
      <div class="progress-bar indeterminate" id="progress-bar"></div>
    </div>
  </div>

  <div class="status-text" id="status-text">Starting...</div>

  <div class="error-container" id="error-container">
    <div class="error-title" id="error-title">Failed to start</div>
    <div class="error-detail" id="error-detail"></div>
    <button class="retry-btn" id="retry-btn" onclick="window.__TAURI__?.event?.emit('splash-retry')">Retry</button>
  </div>

  <script>
    // States driven by Tauri events from main.rs
    const bar = document.getElementById('progress-bar');
    const statusText = document.getElementById('status-text');
    const errorContainer = document.getElementById('error-container');
    const errorTitle = document.getElementById('error-title');
    const errorDetail = document.getElementById('error-detail');
    const steps = [
      document.getElementById('step-0'),
      document.getElementById('step-1'),
      document.getElementById('step-2'),
    ];

    const MESSAGES = {
      starting: 'Starting...',
      models: 'Loading processing engine...',
      server: 'Starting application server...',
      ready: 'Ready',
      error: 'Something went wrong',
    };

    function setStep(index, state) {
      if (steps[index]) {
        steps[index].className = 'step-dot ' + state;
      }
    }

    function setProgress(percent) {
      bar.classList.remove('indeterminate');
      bar.style.width = percent + '%';
    }

    function setIndeterminate() {
      bar.classList.add('indeterminate');
      bar.style.width = '';
    }

    function showError(title, detail) {
      errorContainer.classList.add('visible');
      errorTitle.textContent = title || 'Failed to start';
      errorDetail.textContent = detail || '';
      bar.classList.remove('indeterminate');
      bar.style.width = '0%';
      bar.style.background = 'var(--red)';
    }

    // Listen for state updates from Tauri
    // main.rs emits 'splash-update' with { state, detail? }
    if (window.__TAURI__?.event) {
      window.__TAURI__.event.listen('splash-update', (event) => {
        const { state, detail } = event.payload;

        switch (state) {
          case 'starting':
            statusText.textContent = MESSAGES.starting;
            setStep(0, 'active');
            setIndeterminate();
            break;

          case 'models':
            statusText.textContent = MESSAGES.models;
            setStep(0, 'done');
            setStep(1, 'active');
            setProgress(33);
            break;

          case 'server':
            statusText.textContent = MESSAGES.server;
            setStep(1, 'done');
            setStep(2, 'active');
            setProgress(66);
            break;

          case 'ready':
            statusText.textContent = MESSAGES.ready;
            setStep(2, 'done');
            setProgress(100);
            break;

          case 'error':
            statusText.textContent = '';
            setStep(0, steps[0].classList.contains('done') ? 'done' : 'error');
            setStep(1, steps[1].classList.contains('done') ? 'done' : 'error');
            setStep(2, 'error');
            showError(
              detail || 'Failed to start processing engine',
              'Check that no other instance is running and try again.'
            );
            break;
        }
      });
    }
  </script>
</body>
</html>
