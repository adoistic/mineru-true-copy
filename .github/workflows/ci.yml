# MinerU True Copy — CI workflow
#
# Three jobs:
#   1. test         (pull_request) — lint, vitest, cargo check, pytest on macos-latest
#   2. strip-clean  (pull_request) — guards against re-introducing post-AGPL-strip symbols
#   3. setup-preflight (pull_request) — runs scripts/setup.sh --preflight-only to
#      catch regressions in the developer-setup flow without downloading 3.4 GB
#      of models.
#
# v0.1 ships as a developer setup (scripts/setup.sh), not a .dmg. There is
# intentionally no release / build / publish job. The v0.1.0 git tag is a
# source marker; the GitHub Release page links to setup instructions.
# Re-introducing a packaging job is a v0.2 distribution-architecture decision.

name: CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.event_name == 'pull_request'
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # v0.1 ships macOS only. Windows + Linux are HELP-WANTED for v0.2.
        os: [macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # macos-latest runners ship with Xcode CLT, which is all Tauri v2 needs
      # for `cargo check`. No extra system packages required.

      - name: Install npm deps
        working-directory: app
        run: npm ci

      - name: Lint (eslint)
        # v0.1: warn-only. The codebase has 9 pre-existing lint errors that
        # accumulated before CI enforcement existed (see docs/HELP-WANTED.md).
        # Lint output remains visible on every PR; flip continue-on-error off
        # once the cleanup ask lands.
        working-directory: app
        run: npm run lint
        continue-on-error: true

      - name: Vitest
        working-directory: app
        run: npx vitest run

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check

      # Pytest dependency situation at v0.1:
      # The full requirements.txt provisions ~3 GB of torch/transformers
      # weight downloads + native compiles, which is too slow for every PR
      # (5-10 min on a clean cache). CI installs only pytest + bs4 and runs
      # the one file that mocks the heavy deps (test_translation.py).
      # The full suite runs locally via `mineru-venv` per CONTRIBUTING.md;
      # nightly/tag CI can run scripts/setup.sh --full-verify when added.
      - name: Install pytest + bs4
        run: python -m pip install --upgrade pip pytest beautifulsoup4

      - name: Pytest (mineru-independent suite)
        run: python -m pytest lib/tests/test_translation.py -v

  strip-clean:
    if: github.event_name == 'pull_request'
    name: Strip-clean guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for forbidden symbols
        # Fails if any PR reintroduces tokens stripped during the AGPL relaunch.
        # Excluded from the scan:
        #   README.md / CHANGELOG.md  — historical narrative mentions the strip
        #   runner.smoke.test.ts      — contains the tokens as string literals in
        #                               the existing unit-level anti-regression test
        #   .gitignore                — lists firebase credential filenames (not code)
        #   ci.yml                    — this file uses the tokens as grep patterns
        #   Standard noise dirs/files: node_modules, lock files, dist, etc.
        run: |
          FOUND=0

          echo "=== Checking: firebase (case-insensitive) ==="
          if grep -rwni \
               --exclude-dir=node_modules --exclude-dir=mineru-venv --exclude-dir=test-venv \
               --exclude-dir=.git --exclude-dir=dist --exclude-dir=.next \
               --exclude-dir=docs/internal \
               '--exclude=*.lock' --exclude=CHANGELOG.md --exclude=README.md \
               --exclude=CONTRIBUTING.md --exclude=PULL_REQUEST_TEMPLATE.md \
               '--exclude=runner.smoke.test.ts' --exclude=.gitignore --exclude=ci.yml \
               "firebase" .; then
            echo "ERROR: 'firebase' found in source tree"
            FOUND=1
          fi

          echo "=== Checking: deductCredit ==="
          if grep -rwn \
               --exclude-dir=node_modules --exclude-dir=mineru-venv --exclude-dir=test-venv \
               --exclude-dir=.git --exclude-dir=dist --exclude-dir=.next \
               --exclude-dir=docs/internal \
               '--exclude=*.lock' --exclude=CHANGELOG.md --exclude=README.md \
               --exclude=CONTRIBUTING.md --exclude=PULL_REQUEST_TEMPLATE.md \
               '--exclude=runner.smoke.test.ts' --exclude=ci.yml \
               "deductCredit" .; then
            echo "ERROR: 'deductCredit' found in source tree"
            FOUND=1
          fi

          echo "=== Checking: activationKey ==="
          if grep -rwn \
               --exclude-dir=node_modules --exclude-dir=mineru-venv --exclude-dir=test-venv \
               --exclude-dir=.git --exclude-dir=dist --exclude-dir=.next \
               --exclude-dir=docs/internal \
               '--exclude=*.lock' --exclude=CHANGELOG.md --exclude=README.md \
               --exclude=CONTRIBUTING.md --exclude=PULL_REQUEST_TEMPLATE.md \
               '--exclude=runner.smoke.test.ts' --exclude=ci.yml \
               "activationKey" .; then
            echo "ERROR: 'activationKey' found in source tree"
            FOUND=1
          fi

          echo "=== Checking: ActivationScreen ==="
          if grep -rwn \
               --exclude-dir=node_modules --exclude-dir=mineru-venv --exclude-dir=test-venv \
               --exclude-dir=.git --exclude-dir=dist --exclude-dir=.next \
               --exclude-dir=docs/internal \
               '--exclude=*.lock' --exclude=CHANGELOG.md --exclude=README.md \
               --exclude=CONTRIBUTING.md --exclude=PULL_REQUEST_TEMPLATE.md \
               '--exclude=runner.smoke.test.ts' --exclude=ci.yml \
               "ActivationScreen" .; then
            echo "ERROR: 'ActivationScreen' found in source tree"
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "FAILED: Forbidden symbols detected. Remove them before merging."
            exit 1
          fi

          echo "PASSED: No forbidden symbols found."

  setup-preflight:
    if: github.event_name == 'pull_request'
    name: Setup preflight (scripts/setup.sh --preflight-only)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install brew preflight deps
        run: |
          # macos-latest already has pkg-config / openssl / cmake; install if absent
          for pkg in pkg-config openssl cmake; do
            brew list --formula "$pkg" >/dev/null 2>&1 || brew install "$pkg"
          done

      - name: Run setup.sh --preflight-only
        run: bash scripts/setup.sh --preflight-only
